<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operations Console</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/extjs/6.2.0/classic/theme-crisp/resources/theme-crisp-all.css" />
    <style>
      html, body { margin: 0; height: 100%; }
      .x-panel-header-title-default { font-weight: 600; }
      .ops-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
      .ops-ok { background: #e8f5e9; color: #2e7d32; }
      .ops-warn { background: #fff3e0; color: #ef6c00; }
      .ops-err { background: #ffebee; color: #c62828; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/extjs/6.2.0/ext-all.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
